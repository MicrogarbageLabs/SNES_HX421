# ============================================================
#  hx421.cfg — ld65 config for the HX-421 milestone-1 boot ROM.
#
#  The coprocessor window is 64 KB, flat-addressable ($0000-$FFFF) via
#  bank $C0 and aliased at $8000-$FFFF in the low banks (HiROM-ish, as
#  the bsnes hx421 chip maps it). The DLL serves this window; the ROM
#  image built here IS that window's contents.
#
#  Layout the DLL/bsnes expects:
#    $8000-$FFAF  boot stub + kernel blob (upper half, bank $00 exec)
#    $FFB0-$FFBF  interrupt trampolines (copro keeps static after boot)
#    $FFC0-$FFDF  SNES header (HiROM)
#    $FFE4-$FFFF  65816 vectors (reset @ $FFFC)
#  $0000-$7FFF is the DLL mailbox/staging region — NOT emitted here
#  (the image only needs the upper half; the DLL loads $8000-$FFFF).
#
#  The KERNEL segment is STORED in the window upper half (load=ROM) but
#  assembled to RUN from low WRAM ($0400); boot.s copies it across using
#  the linker-exported __KERNEL_LOAD__ / __KERNEL_RUN__ / __KERNEL_SIZE__.
#
#  Public domain (CC0). No warranty.
# ============================================================

MEMORY {
    # low WRAM the kernel runs from (after DP $00xx, stack $01xx, vars $02xx-$03xx)
    KRAM:    start = $0400,  size = $1C00,  type = rw, define = yes;

    # the 64 KB window; HiROM file offset == address ($0000-$FFFF)
    ROM:     start = $0000,  size = $10000, type = ro, fill = yes, fillval = $00, file = %O;
}

SEGMENTS {
    BOOT:    load = ROM, type = ro,  start = $8000;                          # boot stub (bank $00 exec)
    KERNEL:  load = ROM, run = KRAM, type = rw, define = yes, align = $100;  # stored upper half, runs in WRAM
    TRAMP:   load = ROM, type = ro,  start = $FFB0;                          # NMI/IRQ trampolines (static)
    HEADER:  load = ROM, type = ro,  start = $FFC0;                          # SNES header (HiROM)
    VECTORS: load = ROM, type = ro,  start = $FFE4;                          # 65816 vectors
}
